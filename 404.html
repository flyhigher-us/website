<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Page Not Found | FlyHigher</title>
    <link rel="canonical" href="https://flyhigher.us/404.html">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="error-page">
    <header class="site-header" aria-label="Primary navigation">
      <a class="brand" href="https://flyhigher.us/" aria-label="FlyHigher home">
        <img src="assets/logo.png" alt="" class="brand-icon">
        <span>FlyHigher</span>
      </a>
      <nav class="nav-links" aria-label="Page sections">
        <a href="https://flyhigher.us/#capabilities">Capabilities</a>
        <a href="https://flyhigher.us/#method">Method</a>
        <a href="https://flyhigher.us/#contact">Contact</a>
      </nav>
    </header>

    <main class="error-main" aria-labelledby="error-title">
      <section class="error-content">
        <p class="eyebrow">404</p>
        <h1 id="error-title">This page is outside the flight plan.</h1>
        <p>
          The link may have moved, or the page may not exist. Return to
          FlyHigher or request an intro.
        </p>
        <div class="hero-actions">
          <a class="button-primary" href="https://flyhigher.us/">Return home</a>
          <a
            class="button-secondary"
            href="mailto:team@flyhigher.us?subject=FlyHigher%20intro%20request"
          >
            team@flyhigher.us
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
